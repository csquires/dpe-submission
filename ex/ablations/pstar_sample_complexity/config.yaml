# directory configuration
data_dir: "ex/ablations/pstar_sample_complexity/data"
raw_results_dir: "ex/ablations/pstar_sample_complexity/raw_results"
processed_results_dir: "ex/ablations/pstar_sample_complexity/processed_results"
figures_dir: "ex/ablations/pstar_sample_complexity/figures"
hpo_configs_dir: "ex/ablations/pstar_sample_complexity/hpo_configs"
hpo_results_dir: "ex/ablations/pstar_sample_complexity/hpo_results"
hpo_summary_dir: "ex/ablations/pstar_sample_complexity/hpo_summary"

# data generation
data_dim: 3
kl_divergence: 1.5
num_instances: 20
n_std_padding: 3.0

# sample counts
nsamples_p0_p1: 3000
nsamples_pstar_values: [100, 1000, 3000, 9000]
nsamples_test: 1024

# fixed architecture choices
num_waypoints: 15

# HPO settings
hpo_num_trials: 30            # random search trials per (method, pstar_idx)
hpo_num_eval_instances: 5     # instances (of 20) evaluated per HPO trial

# algorithms to run (used by step3 to discover result files)
algorithms:
  - MultiHeadTriangularTDRE
  - TriangularCTSM
  - TriangularCTSM2D
  - TriangularFMDRE
  - TriangularMDRE
  - TriangularTSM
  - TriangularVFM
  - TriangularVFM2D

# execution
device: "cuda"
seed: 1729
