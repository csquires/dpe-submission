data_dir: "${DPE_DATA_ROOT}/plugin_dre/data"
results_dir: "ex/ablations/plugin_dre/results"
figures_dir: "ex/ablations/plugin_dre/figures"

# HPO (layout mirrors dre_sample_complexity / pstar_sample_complexity)
hpo_configs_dir: "ex/ablations/plugin_dre/hpo_configs"
hpo_results_dir: "ex/ablations/plugin_dre/hpo_results"
hpo_summary_dir: "ex/ablations/plugin_dre/hpo_summary"
hpo_num_trials: 30             # random search trials per (method, kl)
hpo_num_eval_instances: 1      # capped at num_instances_per_kl (plugin_dre uses 1)

data_dim: 2
kl_divergences: [0.5, 2.0, 4.0, 8.0]
num_instances_per_kl: 1        # Single instance per KL (simpler visualization)
nsamples_train: 10000          # Large training set

# Grid parameters
grid_size: 50                  # 50x50 grid = 2500 evaluation points
n_std_padding: 5.0             # 5-sigma region around modes

# Visualization
rgb_resolution: 300            # Background density image resolution
marker_size_min: 0.1
marker_size_max: 5
marker_alpha_min: 0.2          # Minimum opacity (for lowest errors)
marker_alpha_max: 0.8          # Maximum opacity (for highest errors)

# Algorithms
tdre_waypoints: [5]
mdre_waypoints: [15]

device: "cuda"
seed: 1729
