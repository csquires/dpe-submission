provenance:
  source: "mirrored from mnist_cond_flow.yaml; pendulum has h5 layout with samples_p0/p1 of shape (5000, 18) per cell, so per-cell training concat is 10000 rows. classifier methods get batch_size to engage mini-batch SGD on cpu when n > bs."
  derived_at: "2026-05-03"
  rule: "copy mnist hyperparameter ranges as starting point; pendulum sample count is 10K per cell concat (vs EIG/dbpedia ~80K), so batch_size choice [4096, 8192, 16384] gives mixed mini-batch (4096, 8192) vs full-batch (16384) coverage. all values strictly greater than MS nsamples_train (4096) so MS would auto-fall-back if shared."
  notes:
    - "classifier methods (BDRE, MDRE_15, MultiHeadTDRE, TriangularMDRE, MultiHeadTriangularTDRE) include batch_size: choice [4096, 8192, 16384]."
    - "FMDRE/FMDRE_S2/TriangularFMDRE owned by lite watchdog (jid 7666009) on partition=general; do not include here."
    - "MultiHeadTDRE batch_size capped at 16384 to avoid cpu cache thrash (per-step rows = num_heads * bs)."
  patches_2026_05_03:
    - "initial creation of pendulum recalibrated spec with batch_size for classifier methods."

workflow_version: "v1"

methods:
  TSM:
    n_epochs: ['log_uniform_int', 856, 1425]
    lr: ['log_uniform', 0.000375, 0.002428]
    batch_size: ['choice', [64, 128]]
    eps: ['log_uniform', 1.484e-06, 8.586e-05]

  CTSM:
    n_epochs: ['log_uniform_int', 752, 1278]
    lr: ['log_uniform', 0.0003004, 0.001582]
    batch_size: ['choice', [128, 256]]
    sigma: ['log_uniform', 0.5096, 1.129]
    eps: ['log_uniform', 0.0003473, 0.002182]

  VFM:
    n_epochs: ['log_uniform_int', 789, 1431]
    lr: ['log_uniform', 0.0005186, 0.0029]
    batch_size: ['choice', [64, 128, 256]]
    k: ['choice', [10, 20]]
    eps: ['log_uniform', 0.001204, 0.004642]
    integration_steps: ['uniform_int', 855, 3000]

  BDRE:
    latent_dim: ['choice', [64, 128, 256]]
    learning_rate: ['log_uniform', 1.0e-4, 1.0e-2]
    num_epochs: ['log_uniform_int', 100, 500]
    # pendulum per-cell concat is 10K (p0=5000 + p1=5000); 16384 would silently
    # collapse to full-batch via the bs>=n fallback, wasting an HPO sample, so we
    # encode the full-batch control explicitly as null. resulting choices:
    #   4096 -> ~3 mini-batches per epoch
    #   8192 -> 2 mini-batches per epoch (last tiny)
    #   null -> full-batch (control)
    batch_size: &classifier_minibatch_pendulum ['choice', [4096, 8192, null]]

  MDRE_15:
    latent_dim: ['choice', [64, 128, 256]]
    learning_rate: ['log_uniform', 1.0e-4, 1.0e-2]
    num_epochs: ['log_uniform_int', 100, 500]
    num_waypoints: ['choice', [5, 10, 15, 20]]
    batch_size: *classifier_minibatch_pendulum

  MultiHeadTDRE:
    learning_rate: ['log_uniform', 1.0e-4, 1.0e-2]
    num_epochs: ['log_uniform_int', 100, 1000]
    hidden_dim: ['choice', [16, 32, 64, 128]]
    head_dim: ['choice', [10, 20, 40]]
    num_shared_layers: ['choice', [1, 2, 3]]
    num_waypoints: ['choice', [5, 10, 15]]
    batch_size: *classifier_minibatch_pendulum

  MultiHeadTriangularTDRE:
    learning_rate: ['log_uniform', 0.0001386, 0.007548]
    num_epochs: ['log_uniform_int', 117, 793]
    hidden_dim: ['choice', [16, 32, 64, 128]]
    head_dim: ['choice', [10, 20, 40]]
    num_shared_layers: ['choice', [1, 3]]
    num_waypoints: ['choice', [5, 10, 15]]
    vertex: ['uniform', 0.2, 0.8]
    batch_size: *classifier_minibatch_pendulum

  TriangularMDRE:
    latent_dim: ['choice', [64, 128, 256]]
    learning_rate: ['log_uniform', 1.0e-4, 1.0e-2]
    num_epochs: ['log_uniform_int', 100, 500]
    midpoint_oversample: ['choice', [3, 5, 7]]
    gamma_power: ['uniform', 1.0, 5.0]
    num_waypoints: ['choice', [5, 10, 15]]
    vertex: ['uniform', 0.2, 0.8]
    batch_size: *classifier_minibatch_pendulum

  TriangularTSM:
    n_epochs: ['log_uniform_int', 750, 1500]
    lr: ['log_uniform', 3.0e-4, 3.0e-3]
    batch_size: ['choice', [64, 128, 256]]
    hidden_dim: ['choice', [128, 256]]
    eps: ['log_uniform', 1.0e-5, 1.0e-3]
    vertex: ['uniform', 0.2, 0.8]
    peak_max: ['uniform', 0.5, 1.0]

  TriangularCTSM_V1:
    n_epochs: ['log_uniform_int', 752, 1339]
    lr: ['log_uniform', 0.0003039, 0.001771]
    batch_size: ['choice', [64, 128, 256]]
    sigma: ['log_uniform', 0.5207, 2.864]
    vertex: ['uniform', 0.233, 0.8]
    eps: ['log_uniform', 0.001119, 0.002559]
    integration_steps: ['uniform_int', 300, 2600]

  TriangularCTSM_V2:
    n_epochs: ['log_uniform_int', 784, 1438]
    lr: ['log_uniform', 0.0003149, 0.0007463]
    batch_size: ['choice', [64, 128, 256]]
    sigma: ['log_uniform', 0.468, 2.327]
    eps: ['log_uniform', 0.0004981, 0.00284]
    integration_steps: ['uniform_int', 300, 2600]

  TriangularCTSM_V3:
    n_epochs: ['log_uniform_int', 761, 1389]
    lr: ['log_uniform', 0.0008915, 0.002518]
    batch_size: ['choice', [128, 256]]
    sigma: ['log_uniform', 0.3089, 1.167]
    gamma_schedule: ['choice', ['linear-stiff', 'sqrt']]
    k: ['choice', [12, 24, 48]]
    t2_max: ['uniform', 0.6, 0.9]
    eps: ['log_uniform', 0.001149, 0.002874]
    path_height: ['uniform', 1.0, 2.0]
    integration_steps: ['uniform_int', 300, 2600]

  TriangularVFM_V1:
    n_epochs: ['log_uniform_int', 770, 1399]
    lr: ['log_uniform', 0.0006421, 0.001883]
    batch_size: ['choice', [64, 128, 256]]
    sigma: ['log_uniform', 0.9618, 1.934]
    vertex: ['uniform', 0.2, 0.4333]
    gamma_min: ['log_uniform', 0.01206, 0.08425]
    eps: ['log_uniform', 0.001471, 0.004242]
    integration_steps: ['uniform_int', 1114, 3000]

  TriangularVFM_V2:
    n_epochs: ['log_uniform_int', 800, 1144]
    lr: ['log_uniform', 0.0005186, 0.001405]
    batch_size: ['choice', [64, 128, 256]]
    k: ['choice', [10]]
    eps: ['log_uniform', 0.001006, 0.003367]
    integration_steps: ['uniform_int', 513, 3000]

  TriangularVFM_V3:
    n_epochs: ['log_uniform_int', 797, 1428]
    lr: ['log_uniform', 0.0005253, 0.002865]
    batch_size: ['choice', [64, 128, 256]]
    k: ['choice', [10, 20]]
    gamma_schedule: ['choice', ['linear-stiff']]
    t2_max: ['uniform', 0.6, 0.8976]
    eps: ['log_uniform', 0.001268, 0.003903]
    path_height: ['uniform', 1.0, 2.0]
    integration_steps: ['uniform_int', 579, 3000]

# FMDRE family deliberately omitted -- owned by lite watchdog (jid 7666009 as of 2026-05-03)
# on partition=general. when launching pendulum in this campaign, pass --methods CSV explicitly
# (excluding these 3):
#   --methods BDRE,CTSM,MDRE_15,MultiHeadTDRE,MultiHeadTriangularTDRE,TSM,TriangularCTSM_V1,TriangularCTSM_V2,TriangularCTSM_V3,TriangularMDRE,TriangularTSM,TriangularVFM_V1,TriangularVFM_V2,TriangularVFM_V3,VFM
