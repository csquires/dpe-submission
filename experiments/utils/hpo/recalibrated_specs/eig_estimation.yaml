provenance:
  derived_at: '2026-05-01'
  rule: "narrow capacity for eig_estimation: cap hidden_dim at 128 (non-flow) or 256\
    \ (flow), drop deepest num_shared_layers (multi-head methods), reduce n_hidden_layers\
    \ by 1 (where >1). hidden_dim added to base_search_space as HP for methods that\
    \ didn't expose it (TSM, CTSM, BDRE, MDRE_15, TriangularCTSM_V*, VFM, TriangularVFM_V*)\
    \ \u2014 wrapper accepts via **flat_hp passthrough where supported. methods using\
    \ bare TimeScoreNetwork1D don't have hidden_dim as HP in base_search_space; they\
    \ use wrapper default. yaml lists ALL CPU-eligible neural methods explicitly so\
    \ the 3 experiments can run without leaning on METHOD_SPECS defaults."
workflow_version: v1
