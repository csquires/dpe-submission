provenance:
  derived_at: '2026-05-01'
  rule: 'narrow capacity for eig_estimation: cap hidden_dim at 128 (non-flow) or 256
    (flow), and drop deepest num_shared_layers option for MHTTDRE. rationale: eig_estimation''s
    data is lower-dimensional / lower-complexity than mnist_cond_flow; over-parameterization
    wastes wall budget without gain. layer-count narrowing only possible for methods
    exposing it as HP (MHTTDRE). other methods hardcode depth in builders; out of
    scope here.'
