# hidden dimension scaling experiment for density ratio estimation

# directory configuration (env-var-templated; expanded by src.utils.io._load_config)
data_dir: ${DPE_DATA_ROOT}/dre_hidden_dim_scaling/data
raw_results_dir: ${DPE_DATA_ROOT}/dre_hidden_dim_scaling/raw_results
processed_results_dir: ${DPE_DATA_ROOT}/dre_hidden_dim_scaling/processed_results
figures_dir: ${DPE_DATA_ROOT}/dre_hidden_dim_scaling/figures

# data generation
data_dim: 3
kl_divergence: 5.4
num_instances: 20
nsamples_train: 8100
nsamples_test: 1024

# hidden dimension sweep - main experimental variable
hidden_dims: [16, 32, 64, 128, 256]

# model hyperparameters
num_waypoints: 15
num_layers: 4
num_epochs: 100

# tsm-specific hyperparameters
tsm_n_epochs: 1000
tsm_batch_size: 512
tsm_lr: 0.001

# learning rate defaults per (method, hidden_dim)
lr_defaults:
  TriangularMDRE:
    16: 0.003
    32: 0.003
    64: 0.003
    128: 0.003
    256: 0.075
  MultiHeadTriangularTDRE:
    16: 0.005
    32: 0.001
    64: 0.025
    128: 0.025
    256: 0.025
  TSM:
    16: 0.0125
    32: 0.0125
    64: 0.0025
    128: 0.0025
    256: 0.0025

# learning rate multipliers for sweep
lr_multipliers: [0.1, 0.3, 0.9, 3.0, 6.0]

# algorithms to compare
algorithms:
  - TriangularMDRE
  - MultiHeadTriangularTDRE
  - TSM

# compute configuration
device: cuda
seed: 1729
