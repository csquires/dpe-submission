# === Pendulum Environment Constants ===
pendulum:
  g: 10.0                # float > 0; gravitational acceleration (m/s^2)
  ell: 1.0               # float > 0; pendulum length (m)
  m: 1.0                 # float > 0; mass (kg)
  dt: 0.05               # float > 0; integration timestep (s)
  action_clip: 2.0       # float > 0; action clip bound (N*m)
  theta_dot_clip: 8.0    # float > 0; angular velocity clip bound (rad/s)
  mu0:
    theta_bounds: [-3.141592653589793, 3.141592653589793]   # [rad, rad]; theta in [-pi, pi]
    theta_dot_bounds: [-1.0, 1.0]                            # [rad/s, rad/s]; initial ang vel
  r_E_name: "upright"      # str; exact name -> resolves to src.utils.pendulum.r_upright
  r_anti_name: "swingdown" # str; exact name -> resolves to src.utils.pendulum.r_swingdown
  sigma_pi: 1.0            # float > 0; gaussian policy std dev (fixed; not swept). raised from 0.3 to soften per-step KL so the small-K1 regime is reachable on a finite alpha grid.

# === Tile-Coded Q-Function Grid ===
q_grid:
  N_theta: 128             # int > 0; tiles along theta in [-pi, pi)
  N_theta_dot: 128         # int > 0; tiles along theta_dot
  N_action: 21             # int > 0; action grid points in [-action_clip, action_clip]
  gamma: 0.99              # float in (0, 1); discount factor
  fqi_max_iter: 1000       # int > 0; fitted-q-iteration loop limit
  fqi_tol: 1.0e-4          # float > 0; bellman residual stopping tolerance
  cache_dir: ${DPE_DATA_ROOT}/pendulum_eldr_estimation/q_cache  # heavy; offloaded; hdf5 cache keyed by cfg sha256

# === Trajectory Horizon ===
trajectory:
  T: 5                     # int > 0; horizon length (T+1 timesteps total). shortened from 50 to keep trajectory KL within a range where the [0.3, 24.3] target schedule is feasible.
  # NOTE: T is a sweep axis per design. recommended sweep set: {10, 30, 100}.
  #       run a separate experiment per T (separate config file or overridden at cli).

# === Trajectory-Level KL Grid ===
traj_kl_grid:
  G_alpha: 30              # int > 0; grid resolution along alpha
  G_beta: 30               # int > 0; grid resolution along beta in [0, 1]
  M: 200                   # int > 0; rollouts per (alpha, beta) cell for MC KL estimation
  alpha_grid: logspace     # str; "linspace" -> alpha in [0, 1]; "logspace" -> alpha in [10^alpha_log_min, 1]. logspace resolves the small-K1 regime.
  alpha_log_min: -4        # int <= 0; used only if alpha_grid==logspace; alphas = logspace(alpha_log_min, 0, G_alpha)
  diagnostic_grid: false   # bool; if true, build coarse G=10 grid first to inspect monotonicity. disabled — parallel grid build doesn't use the diagnostic-grid path.
  kl_se_warn_threshold: 0.1  # float >= 0; warn if relative SE (kl_se / max(|kl_hat|, eps)) > threshold
  cache_dir: ${DPE_DATA_ROOT}/pendulum_eldr_estimation/traj_kl_cache  # heavy; offloaded; hdf5 cached

# === Prescribed KL Targets (Deferred) ===
kl_targets:
  # leave empty initially: the first grid build will print achievable (K1, K2) bounds.
  # then populate with concrete values and rerun. workflow: empty -> grid build -> inspect bounds -> populate -> rerun.
  k1_values: [0.9, 2.7, 8.1, 24.3]   # geometric schedule (ratio 3); 0.3 dropped because logspace-alpha grid is too coarse near zero to snap there
  k2_values: [0.6]                   # singleton; large enough to escape near-zero KL2 saturation, small enough to be reachable at all four K1 alphas
  hard_corner_threshold: 1.0e+9  # float; sentinel; hard-corner branch unused since seeds_default == seeds_hard. note: yaml 1.1 requires the explicit `+` for scientific notation to parse as float, not str.
  seeds_default: 40        # int > 0; seeds per (k1_idx, k2_idx, seed) cell
  seeds_hard: 40           # int > 0; matched to seeds_default (no hard-cell distinction)

# === Sampling and Runtime ===
num_samples: 5000          # int > 0; trajectory triplets per (k1, k2, seed) cell
device: cpu                # str; "cpu" only (pendulum data-gen is numpy end-to-end; no gpu needed)
seed: 1729                 # int; global reproducibility seed

# === Algorithms (List + Waypoints) ===
algorithms:
  - SmoothedTabularPluginDRE
  - TabularPluginDRE
  - BDRE
  - MDRE
  - TriangularMDRE
  - MultiHeadTriangularTDRE
  - TSM
  - CTSM
  - TriangularCTSM
  - TriangularVFM
num_waypoints: 15          # int >= 3; linear interpolation schedule for triangular methods
# NOTE: trajectory experiment may support a different algorithm subset than smodice.
#       these 10 are over-specified for now; downstream step2 filters by trajectory support.

# === Directory Paths ===
data_dir: ${DPE_DATA_ROOT}/pendulum_eldr_estimation/data
raw_results_dir: experiments/pendulum_eldr_estimation/raw_results
processed_results_dir: experiments/pendulum_eldr_estimation/processed_results
figures_dir: experiments/pendulum_eldr_estimation/figures
