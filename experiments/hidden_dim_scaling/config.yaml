# directories - all relative to project root
data_dir: "experiments/hidden_dim_scaling/data"
raw_results_dir: "experiments/hidden_dim_scaling/raw_results"
processed_results_dir: "experiments/hidden_dim_scaling/processed_results"
figures_dir: "experiments/hidden_dim_scaling/figures"

# source data - reuse from eig_estimation experiment
source_data_dir: "experiments/eig_estimation/data"
source_data_dim: 3
source_nsamples: 10000

# filter criteria - select designs matching specific EIG percentage
target_design_eig_percentage: 0.7

# hidden dimension sweep - main experimental variable
hidden_dims: [16, 32, 64, 128, 256]

# model hyperparameters - fixed across all hidden_dim values
mdre_num_waypoints: 15
mdre_num_layers: 3
tsm_n_epochs: 1000
tsm_batch_size: 512
tsm_lr: 0.001

# compute - device and random seed
device: "cuda"
seed: 1729
