# DBpedia ELDR Cond-Flow Experiment Configuration
# Mirrors experiments/mnist_eldr_cond_flow/config.yaml structure.
# K=14 classes; SBERT(all-mpnet-base-v2) -> PCA(64) -> ClassCondVelocityMLP.

# Experimental Grid
alphas: [0.1, 0.3, 0.9, 2.7]
num_pairs_per_alpha: 40
num_samples: 40000

# Encoder + Reduction
sbert_model: 'sentence-transformers/all-mpnet-base-v2'
sbert_batch_size: 256
embedding_dim: 768
pca_dim: 64

# Class-Conditional Flow Training Configuration
latent_dim: 64
num_classes: 14
cond_flow_total_steps: 250000
cond_flow_lr: 0.01
cond_flow_batch_size: 128
cond_flow_hidden_dim: 512
cond_flow_weight_decay: 0.0001
cond_flow_ema_decay: 0.9999
cond_flow_warmup_frac: 0.05

# Estimation Configuration
algorithms: [TriangularMDRE, MultiHeadTriangularTDRE, VFM, TSM, CTSM, TriangularCTSM_V1, TriangularCTSM_V2, TriangularCTSM_V3, TriangularVFM_V1, TriangularVFM_V2, TriangularVFM_V3]
num_waypoints: 15

# Log-Density Evaluation
log_prob_steps: 200
log_prob_chunk_size: 250

# Directory Configuration
ckpt_dir: "${DPE_CKPT_ROOT}/dbpedia_eldr_cond_flow/ckpt"
data_dir: "${DPE_DATA_ROOT}/dbpedia_eldr_cond_flow/data"
hf_cache_dir: "${DPE_DATA_ROOT}/dbpedia_eldr_cond_flow/data/hf_cache"
raw_results_dir: "experiments/dbpedia_eldr_cond_flow/raw_results"
processed_results_dir: "experiments/dbpedia_eldr_cond_flow/processed_results"
figures_dir: "experiments/dbpedia_eldr_cond_flow/figures"

# Compute Configuration
device: "cuda"
seed: 1729
